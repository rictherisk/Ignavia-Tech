server {
    listen 80;
    include /etc/nginx/mime.types;
    default_type text/html;

    location /api {
        proxy_pass http://proxy:5000;
        proxy_set_header Content-Type application/json;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
